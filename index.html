<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJ's Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0b09;
  --s1: #111210;
  --s2: #181916;
  --s3: #1f211d;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --text: #e4e2db;
  --text2: #8a887f;
  --text3: #4a4845;
  --accent: #1D9E75;
  --accent-l: #5DCAA5;
  --accent-dim: rgba(29,158,117,0.12);
  --accent-b: rgba(29,158,117,0.25);
  --warn: #BA7517;
  --warn-dim: rgba(186,117,23,0.12);
  --warn-b: rgba(186,117,23,0.25);
  --red: #a33;
  --red-dim: rgba(170,51,51,0.12);
  --font: 'DM Sans', sans-serif;
  --display: 'Syne', sans-serif;
  --mono: 'DM Mono', monospace;
}
html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

/* ── GATE SCREENS ── */
.gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
.gate-box { width: 100%; max-width: 400px; padding: 0 20px; animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.gate-logo { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-dim); border: 1px solid var(--accent-b); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 20px; }
.gate-box h1 { font-family: var(--display); font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 6px; }
.gate-box p { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.6; margin-bottom: 22px; }
.gate-box p a { color: var(--accent-l); text-decoration: none; }
.flabel { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 5px; letter-spacing: 0.04em; }
.finp { width: 100%; background: var(--s2); border: 1px solid var(--border2); border-radius: 8px; padding: 11px 14px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; margin-bottom: 10px; transition: border-color 0.15s; }
.finp:focus { border-color: var(--accent); }
.finp::placeholder { color: var(--text3); }
.gbtn { width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: var(--font); font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; display: block; margin-bottom: 8px; }
.gbtn:hover { opacity: 0.88; }
.sbtn { width: 100%; padding: 10px; background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: 8px; font-family: var(--font); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.15s; margin-bottom: 8px; }
.sbtn:hover { background: var(--s2); }
.sbtn svg { width: 16px; height: 16px; flex-shrink: 0; }
.skip-btn { width: 100%; padding: 10px; background: transparent; color: var(--text3); border: 1px solid var(--border); border-radius: 8px; font-family: var(--font); font-size: 13px; cursor: pointer; margin-bottom: 8px; }
.skip-btn:hover { color: var(--text2); }
.status-row { display: flex; gap: 6px; justify-content: center; margin-bottom: 18px; }
.sbadge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-family: var(--mono); display: flex; align-items: center; gap: 4px; border: 1px solid var(--border2); background: var(--s2); color: var(--text3); }
.sbadge.on { background: var(--accent-dim); color: var(--accent-l); border-color: var(--accent-b); }
.sbadge-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }
.div-row { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
.div-line { flex: 1; height: 1px; background: var(--border); }
.div-row span { font-size: 11px; color: var(--text3); }
.gnote { font-size: 11px; color: var(--text3); text-align: center; margin-top: 10px; line-height: 1.5; }

/* ── MAIN DASHBOARD ── */
#dashboard { display: none; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }

/* TOP BAR */
#topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: var(--s1); border-bottom: 1px solid var(--border); flex-shrink: 0; }
#topbar-left { display: flex; align-items: center; gap: 10px; }
.tb-logo { font-family: var(--display); font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
.tb-date { font-size: 12px; color: var(--text3); font-family: var(--mono); }
#topbar-right { display: flex; align-items: center; gap: 8px; }
.pill-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-family: var(--mono); background: var(--accent-dim); color: var(--accent-l); border: 1px solid var(--accent-b); }
.pill-badge.off { background: var(--s2); color: var(--text3); border-color: var(--border); }
.lbtn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: var(--font); text-decoration: underline; }
.lbtn:hover { color: var(--text2); }
.cal-filter { display: flex; gap: 4px; }
.cf-btn { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family: var(--mono); transition: all 0.15s; }
.cf-btn.active { background: var(--accent-dim); color: var(--accent-l); border-color: var(--accent-b); }

/* CALENDAR */
#cal-section { flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--s1); }
#cal-grid { display: grid; overflow-x: auto; }
#cal-grid.week { grid-template-columns: repeat(7, 1fr); }
#cal-grid.day { grid-template-columns: 1fr; }
#cal-grid.month { grid-template-columns: repeat(7, 1fr); }
.cal-col { border-right: 1px solid var(--border); padding: 8px 10px; min-width: 0; }
.cal-col:last-child { border-right: none; }
.cal-day-header { font-size: 10px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.cal-day-num { font-family: var(--display); font-size: 18px; font-weight: 600; color: var(--text2); margin-bottom: 6px; line-height: 1; }
.cal-col.today .cal-day-num { color: var(--accent-l); }
.cal-col.today .cal-day-header { color: var(--accent-l); }
.cal-event { font-size: 11px; padding: 3px 7px; border-radius: 4px; margin-bottom: 3px; background: var(--accent-dim); border-left: 2px solid var(--accent); color: var(--accent-l); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: default; }
.cal-event.work { background: var(--warn-dim); border-left-color: var(--warn); color: #d4951a; }
.cal-empty { font-size: 11px; color: var(--text3); font-style: italic; }
.cal-loading { font-size: 11px; color: var(--text3); font-family: var(--mono); }

/* EMAIL BANNER */
#email-section { flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--s2); padding: 8px 0; }
#email-header { display: flex; align-items: center; gap: 8px; padding: 0 16px 6px; }
.email-title { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
.email-refresh { font-size: 10px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: var(--mono); text-decoration: underline; }
#email-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 16px; scrollbar-width: none; }
#email-scroll::-webkit-scrollbar { display: none; }
.email-card { flex-shrink: 0; width: 260px; background: var(--s1); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; cursor: pointer; transition: border-color 0.15s; }
.email-card:hover { border-color: var(--border2); }
.email-card.needs-reply { border-left: 2px solid var(--warn); }
.email-card.needs-reply-flag { border-left: 2px solid var(--red); }
.email-from { font-size: 11px; font-weight: 500; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-subj { font-size: 11px; color: var(--text2); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-preview { font-size: 10px; color: var(--text3); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.email-tag { font-size: 9px; padding: 1px 6px; border-radius: 10px; display: inline-block; margin-top: 4px; font-family: var(--mono); }
.email-tag.reply { background: var(--warn-dim); color: var(--warn); border: 1px solid var(--warn-b); }
.email-tag.urgent { background: var(--red-dim); color: var(--red); border: 1px solid rgba(170,51,51,0.25); }
.email-loading { font-size: 12px; color: var(--text3); padding: 0 4px; align-self: center; }

/* BOTTOM SPLIT */
#bottom { display: flex; flex: 1; overflow: hidden; }

/* TODO */
#todo-section { width: 340px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--s1); }
#todo-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.section-title { font-family: var(--display); font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
.todo-counts { font-size: 11px; color: var(--text3); font-family: var(--mono); }
#todo-filter { display: flex; gap: 4px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tf-btn { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; font-family: var(--mono); transition: all 0.15s; }
.tf-btn.active { background: var(--accent-dim); color: var(--accent-l); border-color: var(--accent-b); }
#todo-list { flex: 1; overflow-y: auto; padding: 10px 12px; }
#todo-list::-webkit-scrollbar { width: 3px; }
#todo-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.project-group { margin-bottom: 14px; }
.project-label { font-size: 10px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; padding: 0 4px; }
.task-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 8px; border-radius: 6px; margin-bottom: 3px; transition: background 0.15s; cursor: default; }
.task-item:hover { background: var(--s2); }
.task-item.done { opacity: 0.4; }
.task-cb { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--border2); flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.task-cb:hover { border-color: var(--accent); }
.task-cb.checked { background: var(--accent); border-color: var(--accent); }
.task-cb.checked::after { content: ''; width: 5px; height: 3px; border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(-45deg) translateY(-1px); display: block; }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 13px; color: var(--text); line-height: 1.4; }
.task-item.done .task-text { text-decoration: line-through; color: var(--text3); }
.task-meta { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
.priority-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.p-high { background: #a33; }
.p-med { background: var(--warn); }
.p-low { background: var(--text3); }
.task-proj { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.todo-empty { font-size: 13px; color: var(--text3); text-align: center; padding: 30px 16px; line-height: 1.6; }

/* CHAT */
#chat-section { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
#chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; background: var(--s1); }
.chat-av { width: 24px; height: 24px; border-radius: 50%; background: var(--accent-dim); border: 1px solid var(--accent-b); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--accent-l); font-weight: 500; }
.chat-status { font-size: 12px; color: var(--text2); }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.msg-row { display: flex; gap: 8px; align-items: flex-start; }
.msg-row.user { flex-direction: row-reverse; align-self: flex-end; max-width: 82%; }
.msg-row.ai { max-width: 88%; }
.msg-av { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }
.msg-av.ai { background: var(--accent-dim); color: var(--accent-l); border: 1px solid var(--accent-b); }
.msg-av.user { background: var(--s3); color: var(--text2); border: 1px solid var(--border2); }
.msg-bub { padding: 9px 12px; border-radius: 14px; font-size: 13px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
.msg-row.ai .msg-bub { background: var(--s2); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 3px; }
.msg-row.user .msg-bub { background: var(--accent); color: #fff; border-top-right-radius: 3px; }
.msg-ts { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 3px; padding: 0 3px; }
.msg-row.user .msg-ts { text-align: right; }
.typing-bub { padding: 10px 14px; display: flex; gap: 4px; align-items: center; }
.dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text3); animation: pulse 1.2s infinite; }
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.3)}}
#composer { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; background: var(--s1); flex-shrink: 0; }
#msg-inp { flex: 1; resize: none; background: var(--s2); border: 1px solid var(--border2); border-radius: 10px; padding: 8px 12px; font-family: var(--font); font-size: 13px; color: var(--text); outline: none; max-height: 100px; overflow-y: auto; line-height: 1.5; transition: border-color 0.15s; }
#msg-inp:focus { border-color: var(--accent); }
#msg-inp::placeholder { color: var(--text3); }
#send-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
#send-btn:hover { opacity: 0.85; }
#send-btn svg { width: 13px; height: 13px; fill: white; }

@media (max-width: 700px) {
  #todo-section { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
  #bottom { flex-direction: column; }
}
</style>
</head>

var apiKey = "";
var tokP = "";
var tokW = "";
var chatHistory = [];
var tasks = [];
var calView = "week";
var todoFilter = "all";
var isBusy = false;

// ── STORAGE ──
function saveTasks() { localStorage.setItem("cj_tasks", JSON.stringify(tasks)); }
function loadTasks() {
  try { tasks = JSON.parse(localStorage.getItem("cj_tasks") || "[]"); } catch(e) { tasks = []; }
  // Roll over incomplete tasks from previous days (keep them, just mark date)
  renderTasks();
}

// ── INIT ──
function init() {
  apiKey = localStorage.getItem("asst_key") || "";
  tokP = sessionStorage.getItem("tok_p") || "";
  tokW = sessionStorage.getItem("tok_w") || "";
  if (!apiKey) { showGate("gate-key"); return; }
  if (tokP || tokW) { launchDashboard(); return; }
  showGate("gate-google");
}

function showGate(id) {
  document.getElementById("gate-key").style.display = id === "gate-key" ? "flex" : "none";
  document.getElementById("gate-google").style.display = id === "gate-google" ? "flex" : "none";
  document.getElementById("dashboard").style.display = "none";
}

  apiKey = val;
  localStorage.setItem("asst_key", val);

});

// ── LAUNCH ──
function launchDashboard() {
  document.getElementById("gate-key").style.display = "none";
  document.getElementById("gate-google").style.display = "none";
  document.getElementById("dashboard").style.display = "flex";

  if (tokP) { document.getElementById("pill-p").classList.remove("off"); }

// ── TOPBAR DATE ──
function setTopbarDate() {
  var d = new Date();
  document.getElementById("tb-date").textContent = d.toLocaleDateString([], {weekday:"long", month:"long", day:"numeric"});
}

// ── CALENDAR ──
document.querySelectorAll(".cf-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".cf-btn").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    calView = btn.dataset.view;
    renderCalendar();
  });
});

async function renderCalendar() {
  var grid = document.getElementById("cal-grid");
  grid.className = "cal-grid " + calView;
  grid.innerHTML = "";

  var today = new Date();
  var days = [];

  if (calView === "day") {
    days = [new Date(today)];
    grid.style.gridTemplateColumns = "1fr";
  } else {
    // week: Mon–Sun
    var dow = today.getDay();
    var monday = new Date(today);
    monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
    for (var i = 0; i < 7; i++) {
      var d = new Date(monday);
      d.setDate(monday.getDate() + i);
      days.push(d);
    }
    grid.style.gridTemplateColumns = "repeat(7, 1fr)";
  }

  var events = await fetchCalendarRange(days[0], days[days.length - 1]);

  days.forEach(function(day) {
    var col = document.createElement("div");
    col.className = "cal-col";
    var isToday = day.toDateString() === today.toDateString();
    if (isToday) col.classList.add("today");

    var header = document.createElement("div");
    header.className = "cal-day-header";
    header.textContent = day.toLocaleDateString([], {weekday:"short"});

    var num = document.createElement("div");
    num.className = "cal-day-num";
    num.textContent = day.getDate();

    col.appendChild(header);
    col.appendChild(num);

    var dayEvents = events.filter(function(e) {
      var eDate = new Date(e.start.dateTime || e.start.date);
      return eDate.toDateString() === day.toDateString();
    });

    if (dayEvents.length === 0) {
      var empty = document.createElement("div");
      empty.className = "cal-empty";
      empty.textContent = "free";
      col.appendChild(empty);
    } else {
      dayEvents.slice(0, 4).forEach(function(e) {
        var ev = document.createElement("div");
        var isWork = e.organizer && e.organizer.email && e.organizer.email.includes("campaignzero");
        ev.className = "cal-event" + (isWork ? " work" : "");
        var t = e.start.dateTime ? new Date(e.start.dateTime).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}) : "All day";
        ev.textContent = t + " " + (e.summary || "Event");
        ev.title = (e.summary || "Event");
        col.appendChild(ev);
      });
    }
    grid.appendChild(col);
  });
}

async function fetchCalendarRange(start, end) {
  var allEvents = [];
  var endOfEnd = new Date(end);
  endOfEnd.setHours(23, 59, 59);

  async function fetchFor(token) {
    try {
      var r = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=" + encodeURIComponent(start.toISOString()) + "&timeMax=" + encodeURIComponent(endOfEnd.toISOString()) + "&maxResults=50&singleEvents=true&orderBy=startTime", { headers: { Authorization: "Bearer " + token } });
      var d = await r.json();
      return d.items || [];
    } catch(e) { return []; }
  }

  if (tokP) allEvents = allEvents.concat(await fetchFor(tokP));
  if (tokW) allEvents = allEvents.concat(await fetchFor(tokW));
  return allEvents;
}

// ── EMAIL ──
async function loadEmails() {
  var scroll = document.getElementById("email-scroll");
  scroll.innerHTML = '<span class="email-loading">Loading...</span>';
  var cards = [];
  if (tokP) cards = cards.concat(await fetchEmailCards(tokP, "personal"));
  if (tokW) cards = cards.concat(await fetchEmailCards(tokW, "work"));
  if (!tokP && !tokW) { scroll.innerHTML = '<span class="email-loading">No Google account connected.</span>'; return; }
  if (cards.length === 0) { scroll.innerHTML = '<span class="email-loading">No unread emails.</span>'; return; }
  scroll.innerHTML = "";
  cards.forEach(function(c) {
    var card = document.createElement("div");
    card.className = "email-card" + (c.needsReply ? " needs-reply" : "");
    card.innerHTML =
      '<div class="email-from">' + escHtml(c.from) + '</div>' +
      '<div class="email-subj">' + escHtml(c.subject) + '</div>' +
      '<div class="email-preview">' + escHtml(c.snippet) + '</div>' +
      (c.needsReply ? '<span class="email-tag reply">needs reply</span>' : '');
    card.addEventListener("click", function() {
      document.getElementById("msg-inp").value = 'Tell me more about this email: "' + c.subject + '" from ' + c.from;
      document.getElementById("msg-inp").focus();
    });
    scroll.appendChild(card);
  });
}

async function fetchEmailCards(token, label) {
  try {
    var r = await fetch("https://www.googleapis.com/gmail/v1/users/me/messages?maxResults=8&q=is:unread", { headers: { Authorization: "Bearer " + token } });
    var d = await r.json();
    if (!d.messages) return [];
    var cards = await Promise.all(d.messages.slice(0, 7).map(async function(m) {
      var mr = await fetch("https://www.googleapis.com/gmail/v1/users/me/messages/" + m.id + "?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date", { headers: { Authorization: "Bearer " + token } });
      var md = await mr.json();
      var h = {};
      ((md.payload && md.payload.headers) || []).forEach(function(x) { h[x.name] = x.value; });
      // Heuristic: needs reply if subject starts with Re: or Fwd: and is unread
      var needsReply = /^(Re:|Fwd:)/i.test(h.Subject || "");
      return { from: cleanFrom(h.From || "?"), subject: h.Subject || "(no subject)", snippet: md.snippet || "", needsReply: needsReply, label: label };
    }));
    return cards;
  } catch(e) { return []; }
}

document.getElementById("email-refresh-btn").addEventListener("click", loadEmails);

function cleanFrom(from) {
  var m = from.match(/^"?([^"<]+)"?\s*</);
  return m ? m[1].trim() : from.replace(/<[^>]+>/, "").trim();
}
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ── TASKS ──
function renderTasks() {
  var list = document.getElementById("todo-list");
  list.innerHTML = "";

  var filtered = tasks.filter(function(t) {
    if (todoFilter === "today") return t.today && !t.done;
    if (todoFilter === "high") return t.priority === "high" && !t.done;
    return true;
  });

  var done = tasks.filter(function(t) { return t.done; }).length;
  document.getElementById("todo-counts").textContent = (tasks.length - done) + " left";

  if (filtered.length === 0) {
    list.innerHTML = '<div class="todo-empty">No tasks yet.\nPaste a list in chat and I\'ll organize it.</div>';
    return;
  }

  // Group by project
  var groups = {};
  filtered.forEach(function(t) {
    var proj = t.project || "General";
    if (!groups[proj]) groups[proj] = [];
    groups[proj].push(t);
  });

  // Sort projects: Campaign Zero, KnoVo first
  var order = ["Campaign Zero", "KnoVo", "Cuyahoga Spring Break Series", "Michael O.D. Brown Scholarship", "General"];
  var projKeys = Object.keys(groups).sort(function(a, b) {
    var ai = order.indexOf(a); var bi = order.indexOf(b);
    if (ai === -1) ai = 99; if (bi === -1) bi = 99;
    return ai - bi;
  });

  projKeys.forEach(function(proj) {
    var group = document.createElement("div");
    group.className = "project-group";
    var label = document.createElement("div");
    label.className = "project-label";
    label.textContent = proj;
    group.appendChild(label);

    // Sort by priority within group
    var pOrder = {high:0, med:1, low:2};
    groups[proj].sort(function(a,b) { return (pOrder[a.priority]||1) - (pOrder[b.priority]||1); });

    groups[proj].forEach(function(task) {
      var item = document.createElement("div");
      item.className = "task-item" + (task.done ? " done" : "");

      var cb = document.createElement("div");
      cb.className = "task-cb" + (task.done ? " checked" : "");
      cb.addEventListener("click", function() {
        task.done = !task.done;
        saveTasks();
        renderTasks();
      });

      var body = document.createElement("div");
      body.className = "task-body";

      var text = document.createElement("div");
      text.className = "task-text";
      text.textContent = task.text;

      var meta = document.createElement("div");
      meta.className = "task-meta";
      var dot = document.createElement("div");
      dot.className = "priority-dot p-" + (task.priority || "low");
      var projSpan = document.createElement("span");
      projSpan.className = "task-proj";
      projSpan.textContent = task.priority || "low";
      meta.appendChild(dot);
      meta.appendChild(projSpan);

      body.appendChild(text);
      body.appendChild(meta);
      item.appendChild(cb);
      item.appendChild(body);
      group.appendChild(item);
    });
    list.appendChild(group);
  });
}

document.querySelectorAll(".tf-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".tf-btn").forEach(function(b) { b.classList.remove("active"); });

function addTasksFromJSON(arr) {
  arr.forEach(function(t) {
    tasks.push({ id: Date.now() + Math.random(), text: t.text, project: t.project || "General", priority: t.priority || "low", today: t.today || false, done: false, created: new Date().toISOString() });
  });
  saveTasks();
  renderTasks();
}

  addAiMsg(g + ", CJ.\n\n" + (connected ? "Calendar and email are live. " : "") + "Paste a task list from Slack or text and I'll organize it by project and priority. Or just talk — I know what you're working on.");

// ── SEND ──
document.getElementById("send-btn").addEventListener("click", handleSend);
document.getElementById("msg-inp").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
document.getElementById("msg-inp").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 100) + "px";
});

async function handleSend() {
  var inp = document.getElementById("msg-inp");
  var text = inp.value.trim();
  if (!text || isBusy) return;
  isBusy = true;
  inp.value = ""; inp.style.height = "auto";
  addUserMsg(text);
  chatHistory.push({role:"user", content:text});
  showTyping();

  // Inject Google data if relevant
  var wantsEmail = /email|gmail|inbox|unread|message/i.test(text);
  var wantsCal = /calendar|schedule|event|today|tomorrow|week|meeting|upcoming/i.test(text);
  var ctx = [];
  if (wantsEmail) {
    if (tokP) ctx.push(await getGmailText(tokP, "Personal Gmail"));
    if (tokW) ctx.push(await getGmailText(tokW, "Work Gmail (CZ)"));
  }
  if (wantsCal) {
    if (tokP) ctx.push(await getCalText(tokP, "Personal"));
    if (tokW) ctx.push(await getCalText(tokW, "Work (CZ)"));
  }

  // Include current tasks as context
  var activeTasks = tasks.filter(function(t) { return !t.done; });
  if (activeTasks.length > 0 && /urgent|priorit|focus|today|should i/i.test(text)) {
    ctx.push("Current open tasks:\n" + activeTasks.map(function(t) { return "  [" + t.priority + "] " + t.text + " (" + t.project + ")"; }).join("\n"));
  }

  var messages = chatHistory.slice();
  if (ctx.length > 0) {
    messages[messages.length - 1] = {role:"user", content: text + "\n\n[Live context]\n" + ctx.join("\n\n")};
  }

  try {
    var res = await fetch(PROXY, {
      method: "POST",
      headers: {"Content-Type":"application/json","x-api-key":apiKey},
      body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:1000, system:SYSTEM, messages:messages})
    });
    var data = await res.json();
    hideTyping();

    if (data.error) {
      addAiMsg("Error: " + data.error.message);
    } else {
      var raw = (data.content || []).filter(function(b) { return b.type === "text"; }).map(function(b) { return b.text; }).join("\n").trim();

      // Parse task JSON if present
      var taskMatch = raw.match(/<tasks>([\s\S]*?)<\/tasks>/);
      if (taskMatch) {
        try {
          var parsed = JSON.parse(taskMatch[1].trim());
          addTasksFromJSON(parsed);
        } catch(e) {}
        var displayText = raw.replace(/<tasks>[\s\S]*?<\/tasks>/, "").trim();
        if (displayText) addAiMsg(displayText);
      } else {
        addAiMsg(raw);
      }
      chatHistory.push({role:"assistant", content:raw});
    }
  } catch(e) {
    hideTyping();
    addAiMsg("Couldn't reach the API: " + e.message);
  }
  isBusy = false;
}

async function getGmailText(token, label) {
  try {
    var r = await fetch("https://www.googleapis.com/gmail/v1/users/me/messages?maxResults=6&q=is:unread", {headers:{Authorization:"Bearer "+token}});
    var d = await r.json();
    if (!d.messages || !d.messages.length) return label + ": no unread.";
    var items = await Promise.all(d.messages.slice(0,5).map(async function(m) {
      var mr = await fetch("https://www.googleapis.com/gmail/v1/users/me/messages/"+m.id+"?format=metadata&metadataHeaders=From&metadataHeaders=Subject", {headers:{Authorization:"Bearer "+token}});
      var md = await mr.json();
      var h = {}; ((md.payload&&md.payload.headers)||[]).forEach(function(x){h[x.name]=x.value;});
      return "  - " + (h.Subject||"(no subject)") + " from " + (h.From||"?");
    }));
    return label + " unread:\n" + items.join("\n");
  } catch(e) { return label + ": error fetching."; }
}

async function getCalText(token, label) {
  try {
    var now = new Date().toISOString();
    var end = new Date(Date.now()+7*86400000).toISOString();
    var r = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin="+encodeURIComponent(now)+"&timeMax="+encodeURIComponent(end)+"&maxResults=10&singleEvents=true&orderBy=startTime", {headers:{Authorization:"Bearer "+token}});
    var d = await r.json();
    if (!d.items||!d.items.length) return label + " calendar: nothing this week.";
    return label + " calendar:\n" + d.items.map(function(e) {
      var s = (e.start&&(e.start.dateTime||e.start.date))||"";
      var ds = s ? new Date(s).toLocaleString([],{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) : "All day";
      return "  - " + ds + ": " + (e.summary||"(no title)");
    }).join("\n");
  } catch(e) { return label + ": error fetching."; }
}
